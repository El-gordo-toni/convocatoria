<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    background:url("{{ bg_path if bg_path else 'https://images.unsplash.com/photo-1599058917765-a780eda07a3e' }}") center/cover fixed;
}
.overlay {background:rgba(0,0,0,0.7);min-height:100vh;padding:20px;}
.container {max-width:900px;margin:auto;}

.card {background:white;color:black;padding:15px;border-radius:10px;margin-bottom:15px;position:relative;}
button {width:100%;padding:10px;background:#1f7a3f;color:white;border:none;border-radius:8px;}
.btn-delete {background:red;width:auto;position:absolute;top:10px;right:10px;}
</style>
</head>

<body>
<div class="overlay">
<div class="container">

<h1>{{ config.titulo }}</h1>
<p>{{ config.subtitulo }}</p>

<!-- FORM -->
<div class="card">
<form method="POST">

<input name="nombre" placeholder="Nombre" required><br><br>
<input name="apellido" placeholder="Apellido" required><br><br>
<input name="matricula" placeholder="Matrícula"><br><br>

<select name="asistencia">
{% for op in opciones %}
<option value="{{ op }}">{{ op }}</option>
{% endfor %}
</select>

<br><br>
<button>Anotarme</button>

</form>
</div>

<!-- WHATSAPP -->
<div class="card">
<button onclick="compartir()">📲 Compartir</button>
</div>

<!-- ADMIN -->
{% if admin %}
<div class="card">
<h3>⚙️ Panel Admin</h3>

<form method="POST" action="/update_config">
<input name="titulo" value="{{ config.titulo }}">
<input name="subtitulo" value="{{ config.subtitulo }}">
<input name="opciones" value="{{ opciones|join(',') }}" placeholder="Confirmado,Duda,No juega">
<button>Guardar config</button>
</form>

<br>

<form method="POST" action="/upload_bg" enctype="multipart/form-data">
<input type="file" name="imagen">
<button>Subir fondo</button>
</form>

<br>

<a href="/reset">Reset</a><br>
<a href="/logout">Salir</a>
</div>
{% else %}
<div class="card">
<form method="POST" action="/admin">
<input type="password" name="password" placeholder="Clave admin">
<button>Entrar</button>
</form>
</div>
{% endif %}

<h3>📋 Participantes (<span id="count">{{ participantes|length }}</span>)</h3>

<div id="lista">
{% for p in participantes %}
<div class="card">
{{ p.nombre }} {{ p.apellido }}<br>
<small>{{ p.asistencia }}</small>

{% if admin %}
<a href="/delete/{{ p.id }}"><button class="btn-delete">❌</button></a>
{% endif %}
</div>
{% endfor %}
</div>

</div>
</div>

<script>
const isAdmin = {{ 'true' if admin else 'false' }};

function compartir(){
    let url = window.location.href;
    window.open("https://wa.me/?text="+encodeURIComponent("Sumate al torneo:\n"+url));
}

async function actualizar(){
    let r = await fetch("/data");
    let d = await r.json();

    let html = "";

    d.jugadores.forEach(p=>{
        html += `<div class="card">
            ${p.nombre} ${p.apellido}<br>
            <small>${p.asistencia}</small>
            ${isAdmin ? `<a href="/delete/${p.id}"><button class="btn-delete">❌</button></a>` : ""}
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("count").innerText = d.jugadores.length;
}

setInterval(actualizar, 5000);
</script>

</body>
</html>
