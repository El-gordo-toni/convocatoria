<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;color:white;background:url("{{ bg_path if bg_path else 'https://images.unsplash.com/photo-1599058917765-a780eda07a3e' }}") center/cover fixed;}
.overlay {background:rgba(0,0,0,0.7);min-height:100vh;padding:20px;}
.container {display:flex;gap:20px;max-width:1100px;margin:auto;}
.left,.right{flex:1}
.card{background:white;color:black;padding:15px;border-radius:10px;margin:10px 0;position:relative;}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#1f7a3f;color:white;}
.btn-delete{background:red;width:auto;position:absolute;top:10px;right:10px;}

@media(max-width:768px){.container{flex-direction:column}}
</style>
</head>

<body>
<div class="overlay">

<h1 style="text-align:center;">{{ config.titulo }}</h1>
<p style="text-align:center;">{{ config.subtitulo }}</p>

<div class="container">

<div class="left">

<div class="card">
<form method="POST">
<input name="nombre" placeholder="Nombre" required>
<input name="apellido" placeholder="Apellido" required>
<input name="matricula" placeholder="Matrícula">
<select name="asistencia">
<option value="Si">Voy</option>
<option value="No">No voy</option>
</select>
<button>Anotarme</button>
</form>
</div>

{% if admin %}
<div class="card">

<form method="POST" action="/update_config">
<input name="titulo" value="{{ config.titulo }}">
<input name="subtitulo" value="{{ config.subtitulo }}">
<button>Guardar textos</button>
</form>

<a href="/reset">Reset</a><br>
<a href="/logout">Salir</a>
</div>
{% endif %}

</div>

<div class="right">

<h3>Van</h3>
{% for p in van %}
<div class="card">
{{ p.nombre }} {{ p.apellido }}
{% if admin %}
<a href="/delete/{{ p.id }}"><button class="btn-delete">❌</button></a>
{% endif %}
</div>
{% endfor %}

<h3>No van</h3>
{% for p in no_van %}
<div class="card">
{{ p.nombre }} {{ p.apellido }}
{% if admin %}
<a href="/delete/{{ p.id }}"><button class="btn-delete">❌</button></a>
{% endif %}
</div>
{% endfor %}

</div>

</div>
</div>

</body>
</html>
