<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matungo</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    background:url("{{ bg_path if bg_path else 'https://images.unsplash.com/photo-1599058917765-a780eda07a3e' }}") center/cover fixed;
}
.overlay {background:rgba(0,0,0,0.7);min-height:100vh;padding:20px;}
.container {display:flex;gap:20px;max-width:1100px;margin:auto;}
.left,.right{flex:1}
.card{background:white;color:black;padding:15px;border-radius:10px;margin:10px 0;position:relative;}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#1f7a3f;color:white;font-weight:bold;}
.btn-delete{
    background:red;
    width:auto;
    padding:5px 10px;
    position:absolute;
    right:10px;
    top:10px;
}
.form-card {padding:20px;}
.input-group {margin-bottom:12px;display:flex;flex-direction:column;}
.input-group label {font-size:13px;margin-bottom:4px;color:#555;}
input,select {padding:12px;border-radius:8px;border:1px solid #ccc;}
.btn-main {margin-top:10px;background:linear-gradient(135deg,#1f7a3f,#28a745);}

#notif{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#1f7a3f;
    padding:10px;
    border-radius:8px;
    display:none;
}

@media(max-width:768px){
    .container{flex-direction:column;}
}
</style>
</head>

<body>
<div class="overlay">

<h1>🏌️Matungo Golf Tour 2026</h1>
<h1>Fecha 2 La Colina Golf Club 12/04</h1>

<div class="container">

<div class="left">

{% if error %}
<div class="card" style="background:#ffdddd;color:red;">
{{ error }}
</div>
{% endif %}

<div class="card form-card">
<form method="POST" onsubmit="playSound()">

<div class="input-group">
<label>Nombre</label>
<input name="nombre" required>
</div>

<div class="input-group">
<label>Apellido</label>
<input name="apellido" required>
</div>

<div class="input-group">
<label>Matrícula</label>
<input name="matricula">
</div>

<div class="input-group">
<label>Asistencia</label>
<select name="asistencia">
<option value="Si">Voy</option>
<option value="No">No voy</option>
</select>
</div>

<button class="btn-main">Anotarme</button>

</form>
</div>

<div class="card">
<button onclick="compartir()">📲 Compartir</button>
</div>

{% if admin %}
<div class="card">
<h3>Admin</h3>

<form method="POST" action="/upload_bg" enctype="multipart/form-data">
<input type="file" name="imagen">
<button>Subir fondo</button>
</form>

<br>
<a href="/reset">Resetear lista</a><br>
<a href="/export">Exportar Excel</a><br>
<a href="/logout">Cerrar sesión</a>
</div>
{% else %}
<div class="card">
<form method="POST" action="/admin">
<input type="password" name="password" placeholder="Clave admin">
<button>Entrar</button>
</form>
</div>
{% endif %}

</div>

<div class="right">
<h3>🟢 Van (<span id="cv"></span>)</h3>
<div id="van"></div>

<h3>🔴 No van (<span id="cn"></span>)</h3>
<div id="novan"></div>
</div>

</div>
</div>

<div id="notif"></div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const isAdmin = {{ 'true' if admin else 'false' }};
let lastCount = 0;

function playSound(){
    document.getElementById("sound").play();
}

function compartir(){
    let url = window.location.href;
    window.open("https://wa.me/?text=" + encodeURIComponent("Sumate al torneo:\n" + url));
}

async function actualizar(){
    let r = await fetch("/data");
    let d = await r.json();

    let v="", n="";

    d.van.forEach(p=>{
        v += `<div class="card">
            ${p.nombre} ${p.apellido}
            ${isAdmin ? `<a href="/delete/${p.id}"><button class="btn-delete">❌</button></a>` : ""}
        </div>`;
    });

    d.no_van.forEach(p=>{
        n += `<div class="card">
            ${p.nombre} ${p.apellido}
            ${isAdmin ? `<a href="/delete/${p.id}"><button class="btn-delete">❌</button></a>` : ""}
        </div>`;
    });

    document.getElementById("van").innerHTML = v;
    document.getElementById("novan").innerHTML = n;

    document.getElementById("cv").innerText = d.van.length;
    document.getElementById("cn").innerText = d.no_van.length;

    let total = d.van.length + d.no_van.length;

    if(total > lastCount){
        let notif = document.getElementById("notif");
        notif.innerText = "Nuevo jugador anotado 🏌️";
        notif.style.display = "block";
        setTimeout(()=>notif.style.display="none",2000);
    }

    lastCount = total;
}

setInterval(actualizar, 5000);
actualizar();
</script>
<button id="music-btn" onclick="toggleMusic()" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: white;
  cursor: pointer;
  z-index: 999;
">
  🔊 Música ON
</button>

<audio id="bg-music" loop>
  <source src="Matungo.mp3" type="audio/mpeg">
</audio>

<script>
  const music = document.getElementById("bg-music");
  const btn = document.getElementById("music-btn");

  // Volumen bajo
  music.volume = 0.2;

  // Estado guardado
  let musicEnabled = localStorage.getItem("musicEnabled");

  if (musicEnabled === null) {
    // Primera vez: activado por default
    musicEnabled = true;
    localStorage.setItem("musicEnabled", "true");
  } else {
    musicEnabled = musicEnabled === "true";
  }

  function updateButton() {
    btn.textContent = musicEnabled ? "🔊 Música ON" : "🔇 Música OFF";
  }

  function toggleMusic() {
    musicEnabled = !musicEnabled;
    localStorage.setItem("musicEnabled", musicEnabled);

    if (musicEnabled) {
      music.play();
    } else {
      music.pause();
    }

    updateButton();
  }

  // Intentar reproducir automáticamente
  if (musicEnabled) {
    const playPromise = music.play();

    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // Si el navegador bloquea autoplay, espera interacción
        console.log("Autoplay bloqueado");
      });
    }
  }

  updateButton();
</script>
</body>
</html>
